version: '3.8'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: prn232-sqlserver

    environment:
      SA_PASSWORD: "Admin@123"
      ACCEPT_EULA: "Y"

    ports:
      - "1433:1433"

  prn232-api:
    build:
      context: .
      dockerfile: PRN232.LMS.API/Dockerfile

    container_name: prn232-api

    ports:
      - "8080:8080"

    depends_on:
      - sqlserver

    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=PRN232_LMS;User Id=sa;Password=Admin@123;TrustServerCertificate=True;"